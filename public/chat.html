<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Startup AI Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-container {
            width: 70%;
            max-width: 900px;
            height: 80vh;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #4f46e5;
            color: white;
            padding: 16px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f9fafb;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            line-height: 1.5;
            font-size: 14px;
        }

        .user {
            background: #4f46e5;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }

        .bot {
            background: #e5e7eb;
            color: #111827;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .chat-input {
            display: flex;
            padding: 15px;
            border-top: 1px solid #e5e7eb;
            background: white;
        }

        .chat-input input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            outline: none;
            font-size: 14px;
        }

        .chat-input button {
            margin-left: 10px;
            padding: 12px 18px;
            border-radius: 8px;
            border: none;
            background: #4f46e5;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        .chat-input button:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        🚀 Startup AI Platform — Mentors • Investors • Legal • Growth
    </div>

    <div class="chat-messages" id="messages">
        <div class="message bot">
            Hi 👋 I’m your Startup AI assistant. Ask me about startup ideas, funding, mentors, legal setup, or scaling your business.
        </div>
    </div>

    <div class="chat-input">
        <input id="input" placeholder="Ask anything about startups..." onkeydown="handleEnter(event)">
        <button onclick="send()">Send</button>
    </div>
</div>

<script>
function send() {
    let input = document.getElementById("input");
    let msg = input.value.trim();
    if (!msg) return;

    input.value = "";

    const messages = document.getElementById("messages");

    messages.innerHTML += `
        <div class="message user">${msg}</div>
    `;
    messages.scrollTop = messages.scrollHeight;

    fetch("/chatbot", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({message: msg})
    })
    .then(res => res.json())
    .then(data => {
        messages.innerHTML += 
            `<div class='msg bot'><b>🤖 Mentor:</b><br>${data.response.replace(/\n/g,"<br>")}</div>`;

        messages.scrollTop = messages.scrollHeight;
    });
}

function handleEnter(event) {
    if (event.key === "Enter") {
        send();
    }
}
</script>

</body>
</html>
